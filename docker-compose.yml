version: "3.8"

services:
  news-aggregator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: news-aggregator-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - news-aggregator-network

networks:
  news-aggregator-network:
    driver: bridge
